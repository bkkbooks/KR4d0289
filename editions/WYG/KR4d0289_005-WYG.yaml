body:
  text: 竹齋詩集跋宋大理司直先竹齋詩集三巻明嘉靖間工部郎中先魯江公鋟版行世兵燹後版散失先府君將重授諸梓其心未嘗一日㤀也府君知四川之榮經縣奏侍榮經署承府君命迄今十有六年又未敢一日忘也奏今待罪錦縣縣為興京地土厚民淳無訟獄簿書之擾歴三考得積俸以剞劂是集集成奉而歎息奏父子兩世各六十餘年而此志始克成可不謂難乎不寧惟是魯江公之初刻也自宋淳熈至嘉靖中間三百有六十年今之重刻也自魯江公以来又二百四十年歴歲月何其多也而是集經世代興亡兵火變遷猶能巻帙依然壽之棃棗以傳于世後之人可不知所重乎先君之屬子姓也豈徒刻是集而諄諄己也後之人不好學則是集置于庋閣飽于蟫魚雖重刻與未刻等非先君所期望之意也願後之人善承之歴億萬年毋墜厥緒可也十六世孫奏謹跋
