body:
  text: 竹齋詩集巻三宋裘萬頃撰五言絶句善利閣次伯仁所題趙子良畫四首箜篌君鄉來分明記江樹想君詩成時夢作白鷗去平生交㳺間吾幘葢屡岸區區稻粱謀君亦逐鴻雁風簷手君詩心跡已清絶何當更長吟坐對澄江雪扁舟兩漁翁清唱發日暮安得如鴟夷相與五湖去餞吳長文司理用脩持賢業教無欠為韻平生不量力妄意希前脩懵懵雖無見拳拳未敢休狂瀾湧如此砥柱其誰為天意必有在吾身姑自持考亭無恙時從㳺孰非賢嵗寒萬木彫松柏始傑然聖賢去我逺何者名事業吾欲到彼岸須君借舟楫過從資直諒夫豈勢利交謂朋黨者誰仁人姑聴教人生天地間離别安能無莫作兒女態相期烈丈夫君姿正而剛名節非所欠臨岐贈一言惟有學不厭自警俗塵易汚人胷次須自潔君看四明老冰壺浸秋月題蘓希亮畫石梁渡山澗上有秦人居嵗寒不種桃汲泉灌佳蔬六言絶句兀坐息綿綿而不絶心了了以常明静室我方燕坐傍人喚作修行七言絶句保福寺對橙菊有感平生愛菊陶彭澤清夜移橙杜草堂千載詩魂招不得獨留風味在僧房兀坐有感意行曾到楚江臯占得雙泉第一寮牕戸䆳深鐘磬逺客塵都向静中消癸亥夜夢丙夜清眠正熟時夢魂飛去拜丹墀小臣乍得披肝膽感慨分明涕淚埀次洪内翰十月桃韻三首千枝萬蕊彫零盡安得枝頭數㸃紅疑是神人冩春色鎮長留影在屏風舊日驪山宫殿中玉妃無數舞衫紅只因歸去蓬萊後夢作寒花笑北風不湏羯鼓促春工一樹霜邉取意紅寄語元冥為収拾莫教人恨五更風次洪内相雙竹韻三首延平兩龍幾年卧歘爾化作寒枝雙春檜長松皆敵國㑹須因壘一時降嬋娟兩枝翠可掬絶勝白璧南金雙留與先生作椽筆詩壇八面受人降管鮑交情真耐乆夷齊義氣更無雙虚花滿眼風號怒一節青青終不降薦福寺次許師詠竹浮雲蹤跡任西東翰墨塲中且用功時對此君哦七字也勝癡坐辯幡風次余仲庸松風閣韻十九首飛花數㸃雨初歇啼鳥一聲春正長讀罷黄庭了無事旋安銀葉試爐香古木隂隂六月凉幽花藉藉四時香絲桐清夜作三弄明月入簾風拂牀爛漫花隂覆短牆花開時候日偏長道人不被春勾引到處惟聞薝蔔香不見詩仙何遜來春風幾度早梅開竹籬茅舍自清絶未用移根東閣栽恰則梅邉春意萌困人天氣又清明爐熏茗盌北牕下卧聼綿蠻黄鳥聲已著遺經洗此心更尋流水濯吾襟經旬不涉溪邉路荇帯苔錢如許深霧閣雲忩先自幽水聲那更繞源流春􅅧紅雨落桃徑晝永清風生茗甌楊栁隂中啼杜鵑梧桐枝上噪𤣥蟬篇章滿眼無人㑹贏得詩翁取意編紛紛眼底正爭馳我獨冥心絶五綦説與傍人俱不信故山惟有白雲知爭春桃李太匆匆随手飄零逐曉風氷雪不侵塵不汚可人惟有嵗寒松顏楊翰墨今誰觧陶謝篇章古所無安得金丹換凡骨白頭深恐媿吾夫平池春去水溶溶人在笙歌一部中柳葉翻風羅帶緑荷花著雨錦衣紅簷間新燕幾時來簷外閒花往嵗栽丹杏碧桃渾落盡綠隂低處結青梅淡月籠花花映牕好風吹竹竹浮香夢回何處一聲笛人静山幽天正凉無所用心魚在沼居然生子燕成窠誰言春去花事歇萱草石榴情更多為憐風雨趣春回故著秋花到處栽蘭菊從來盛風味不妨環繞讀書齋白雲殊不作俗態流水更似知人心溪邉濯足溪上坐樵唱一聲秋滿林坡谷遺書那復有向來一紙抵千金誰知懸腕與卧筆如用大都留此心俗書本作于湖様野鶩家雞强自分王氏無人魯公死只今何處覔雲仍松齋秋吟驕陽赫赫轉秋隂便覺蕭然鬢影侵世事炎凉俄忽爾閒來物理静推尋宿翠巖寺呈李𢎞齋簽判匡廬勝處君曾到誰是淵明與逺公幸有和陶詩巻在好依蓮社此山中同李簽判山行午飯野店簷外羣蜂翂翂因成絶句脱畧人間勢利塲來尋泉石共徜徉飯餘小立茅簷外試問羣蜂有底忙寄宋居士脩叔求庵記翠琰新刋照眼明流傳何日到柴荆從今不恨論交晚我亦碑中有姓名睆山紙帳送宋居士翦裁不惜褚先生要䕶髙人雪屋眠只恐鶴書催起去長留空帳北山巔題書院壁間碑天上真龍去不回世間凡馬漫争馳少年氣習今猶在袖手時來省斷碑日出日出柴門尚嬾開綠隂多處且徘徊槐花滿地無人掃半在牆根印紫苔早作四首雨過長江浪拍天迢迢羲馭水中行舟人指㸃雲開處喜見青山一抹横井梧飛葉送秋聲籬菊緘香待晚晴斗柄横斜河欲没數山青處亂鴉鳴北牕清冷不成眠風遞蛩聲到枕邉試喚兒童巻踈箔一簷花影月娟娟爐香清曉坐書帷竹擁藤牀日到遲自賦短章還自笑不知顏閔有何詩冬日早作黄昏月姊翦雲開夜半雷車送雨來晨起鈎簾望霄漢風花吹堕萬璚瑰午睡午牕春日影悠悠一覺清眠萬事休堪笑邯鄲槐里夢癡兒到老不回頭入京道中曝背露濕芳桃午未乾花時全似麥秋寒征衫不敵東風力試上郵亭曝背看即事二首門前溪水欲平堤漫著漁竿淺處埀晴雨毎闗憂國念豐凶端欲問人知春時耕種夏時耘七月農夫始食新此去田家常要雨雨多元自不妨人次伯仁過道傍田家韻桃源千載鎖烟雲若輩安知古有秦恐是吳興沈東老一尊聊復醉詩人絶句數聲牧笛日将晚一曲樵歌山更幽觧帶盤桓小溪上坐㸔紅葉汎清流久雨園林清樾净無塵池沼黄流去有聲不用飛花來㸃綴但須霽日為澄清上元憶大梵明燈二首經年不到豫章城燈火遥聞鼓吹聲却憶秋屏臺上寺絳紗青玉幾長明突兀招提枕古城夜深鐘磬寂無聲坐馳燈火笙歌地知有何人一㸃明秋日即事斷雁聲邉小雨來菊花强半卧蒼苔乍寒天氣雖宜酒冷淡無心把酒杯九日籬落黄花尚自無白衣况未到吾廬莫令此日負佳節為展淵明采菊圖松齋秋詠次黄存之韻七首少年有策志平戎心事今成一老翁蜀客欵門茶未了防秋又説棗兒紅西風黄葉埽空庭舞鶴翩翩堕雪翎一陣清風通鼻觀木犀亭下讀騷經牽牛引蔓上東籬氣肅清商雨過時人意若隨天意好秋光又到菊花枝閉門思古或傷今每有詩来黙契心紙上不須評巧拙堯夫只是静中吟閒中無辱亦無榮案上圖書有課程静對秋花香黙黙晩風休送亂蟬鳴㨿梧枝䇿事紛紜樓上看山對晩曛縱是樓無山色逺只如小米畫煙雲無事縈心晝掩扉松風度曲入琴徽登髙老矣興猶在塞上秋風戰馬肥次仲庸初冬即事二首常歲霜天分外晴一溪如練浸冰輪今年風雨寧無夜誰與溪梅作小春君家秋實洞庭種小子持來獨未黃莫作蘓州書後夢只今正欠滿林霜雪中戲元徳元齡二弟二首在昔梅花猶有賦如今冰柱亦無詩吾衰不作池塘夢春草生時子合知袖間出手不應遲栁絮漁蓑總是詩二妙得君眞所喜一寒如我有誰知再韻寄元齡弟二首季也東歸何太遲伯兮西望屢吟詩茅簷昨夜雪深尺人在寒牕知不知小舟閒已􅍻江湄滿眼璚瑤定有詩詩似其人人似雪只應清處恐人知雪中再示徳齡二弟三首只道園林春未歸風前一夜桞花飛東皇自是繁華主不用𤣥冥薦玉妃平生蓑笠慣衝寒長憶江湖把釣竿昨夜北牎聞雪作夢魂飛到子陵灘青青牎外幾修篁也學宫梅巧様粧説與恵連須著句雪邊春色到池塘再用韻三首亂飄牎户重重積巧入簾櫳細細飛想見鈞天張樂處瓊琚玉珮列千妃蕙帳一冬無苦寒夢囬長是日三竿那知今夜剡溪路月淡扁舟水滿灘鳳臺仙姊巻銀篁歸去瑶池試曉妝剰粉殘脂無處著化為風絮滿池塘再用韻三首無人低唱兩三巵一任璚瑶滿眼飛羅韈暗塵應洗盡月明吾欲看江妃憶昔騎驢犯曉寒酒旗隨處認長竿灞陵物物皆詩句不用牽船八節灘眼前修潔獨修篁屢倩東風洗曉妝學舞腰肢困珠玉可憐官桞在寒塘再用韻三首棃花月淡珠簾巻桞絮風輕粉蝶飛宫漏無聲牎欲曙霓裳催舞廣寒妃雪裏鷗盟元未寒小舟南浦著漁竿眼明似共月千里衣冷欲迷雲一灘疎梅元自映疎篁誰把璚瑶特地妝雪後園林應更好却輸和靖在錢塘次元徳弟韻跋扈飛揚使我驚鐡中雙鏃日錚錚陳橋舊將今無用一任於菟繞屋行予從元徳弟借到西廊書齋朝夕其間今二年矣戲題作病僧寮且賦三絶雖有圗書伴寂寥不妨題作病僧寮蒲團竹椅南牎下一炷爐香百念消華髮蒼顏一病僧向來文史頗闗情只縁世網無由脫遂學枯禪度此生朝来寮外望西山正在雲煙縹緲間既欲與山為保社不妨身世似雲閒再用韻三首病僧行脚歸來後萬事無心每閉寮日射竹牎風葉亂煙凝香鼎篆紋消厭趨朝市元無夢慣處山林似有情圓覺楞嚴俱不觧維摩㑹下一書生無心對客煨黄獨有意看雲傍白間終日區區弄文墨笑他齊已與髙閒寄元齡弟五首餘生端合老吾廬心地全然與世疎安得數椽西嶺下自行溪水灌園蔬莫怪窮年不入州載書前已㑹盟鷗市朝畢竟多塵事且傍溪山靜處留俯仰之間又一年即看科詔下天邉功名萬一来相逼試向榮途小著鞭少年妄作㓛名想説著長安喜欲狂多病年來怕奔走却思雲壑置藤牀一室蕭然百事無崇朝趺坐對熏爐岫雲舒巻元無礙贏得從容飬病軀元齡弟寄悲秋四詩因次不到青雲志未休近來何事却悲秋短檠䨇目元無恙快讀詩書莫浪愁圗書繞屋未為貧想見長吟日閉門西社諸公久寥落不知招得幾人魂幸有平生古戰場不妨髙卧到羲皇一朝冀北空凡馬須信驊騮道路長支離病骨怯初寒眼底清愁更萬端勉和新詩寄鴻雁江城夜月覓君㸔予旣得烏石崗西望葛壇在雲霄中相去雖逺山勢不斷林木歴歴可數異時乞靈仙翁不難矣喜而成詩寄葛壇主人東西知隔幾牛鳴山勢緜緜若引繩待向岡邊結茅屋幅巾遥禮夜壇燈寄張仲符時得烏石岡地二首今人那似古人賢一鍤隨身日醉眠此老有靈應笑我區區常費買山錢寸田尺地可長久此訣劉郎却未傳他日馭風蓬島去漫留陳迹在山巔次敬叔韻二首玉鑑氷壺一段清鐡中誰與鬬錚錚眼㸔萬里雲霄路不信驊騮地上行别我新詩有許清玉聲金韻两琮琤筆端定自翻三峡乞與餘波贈此行次李司直韻二首字敬子號𢎞齋老來方欲卧林泉一躡紅塵只自憐己與山靈有成說秋風歸騎急加鞭清虚絶跡竟何為自笑平生頗好之正路儻非君得似冥行未免用多岐别胡仲立次敬子伯量二丈韻二首脩水相望無百里從來人物勝西昌𢎞齋自是朝陽鳳伯仲行看接翼翔乾枯如我眞何用漫結蒲團竹椅縁緘口向人無一語此燈他日遣誰傳次余求之坐間所賦地僻不聞車馬鬧官閒但覺屋廬深擺除詩債寂無事一炷爐香觀此心酬余求之二首枕中久已黃粱熟鏡裏從教白髮垂但得漁樵分半席此生何必要人知雨後軒牎無一塵牎前松竹更清新不妨踏遍莓苔地遺我青鞋有故人錢仲庸主簿入京三首風帆轉眼即長安好在交遊半逹官旣有王陽知貢禹不妨乗興一弹冠孤山梅蕊正開時杕履還須訪水湄莫遣冰魂歎牢落只今和靖自能詩野梅官桞自供愁空倚鄱江百尺樓待倩天邊幾鴻鴈為傳消息到皇州别曹敎授三首一歳與君三别離盍簮此去定何時梅花未必堪相寄待倩郵筒寄小詩從渠桞色自青青莫為行人賦渭城只恐南牆舊時竹誤隨風雨作離聲江花岸桞太多情長逐春風管送迎我亦思歸歸未得夜牎愁聼杜鵑聲次吳長文見寄時有衡山之役夜半詩成欲寄君夢魂飛渡楚江津怡怡前日如兄弟今作東西南北人次吳司理見貽二絶韵朱金得喪日悲懽内樂知誰夢見顏君有上池無限水不將涓滴到人間湛然胷次幸清明忍看人間勢利輕我輩相知端有道未應膠漆付雷陳寄題眞愛堂三首終南佳處暫棲遲堪笑唐朝左拾遺渠但借山為捷徑山中滋味豈曽知眞實愛山今有誰此心猨鶴亦難欺看來却是朱居士不媿昌黎五字詩築堂誰不要看山往往襟期了不關欲識此翁髙絶處一心長在白雲間安樂窩三首天闕飛來三大字雲山留住一閒身老仙駕鶴蓬莱去丹竈而今屬後人孤山嘗試一登臨歸夢紛然繞故林箇是平生安樂處清泉白石緫關心生來嵗晚寄南牎燕坐常聞御墨香却笑到天亭上客日將茗粥攪枯腸有感二首絶憐修竹知人意更愛雙泉不世情囬首舊遊渾似夢却因多難悟無生三四知音緫道山荷鉏吾獨在田間人言病驥猶堪秣伏櫪何心十二閒髙安别蘇野塘三首獨立每憐陶靖節北牎終日傲羲皇如今我亦無儕輩逺把心期付野塘胷中泉石眞成癖紙上雲烟緫是詩分我漁舟三四箇故山歸去弄漣漪交盖纔傾便語離絶憐立馬送君時梅花未必堪相寄待倩郵筒寄小詩題希亮畫晩牧歸來月在山夜深茅舍不勝寒棲烏欲動催翁起快傍烟汀把釣竿題昭君圖紛紛争賂毛延壽今日丹青竟不傳萬事無過眞實處後人贏得寫嬋娟題老悟畫巻四首中興以前作山水只說李成與郭熙誰知淳熙有此老健筆不減巨然師吏隐三年楚水頭每隨鳬鴈􅍻扁舟歸來喜色驚鄰里分得瀟湘一片秋何處移來一川竹空濛烟霧染人衣其間應有葛陂杖時出林梢帯雨飛謖謖風前荷葉枯揺揺霜後蓼花疎春鉏舊有江湖約數輩相依正要渠牎前古槐二首密葉繁陰畫不成捲簾雙眼爲渠眀人間炎熱無來處贏得軒牎分外清去歲西湖避暑來藕花無數眼慵開而今歸卧洪崖側看盡飛泉看古槐題針出􅃵字韵一寸堅剛鐵琢成綺羅叢裏度平生有時稚子敲成釣釣得魚兒便作􅃵題箋六七葉蘆秋雨裏兩三箇鴈夕陽邊青天萬里渾無礙衝一作埽破寒潭一抹煙簡瑄上人千里歸來覓故林朱弦雖在少知音春風玉几山前路忍負平生一片心簡瑄上人借楞嚴經石室雲山鎭日扃午雞啼處醉初醒案頭尚有爐熏在試讀楞嚴一巻經題隐室閩浙相望兩道場上人曽炷室中香直須了却舊公案莫向空山便隱藏題破塵讀經所試爲衆生破一塵出經為筏渡滄溟待渠到岸無驚畏復破微塵納此經右隱室破塵二詩爲新陂瑄上人作也瑄師隨孤雲自西禪過育王凡三閲歲孤雲待之甚厚旣歸故山榜其讀經之室曰破塵蓋取華嚴破塵出經巻普饒益衆生之語題其燕坐之室則曰隐室將自是隐藏也予謂育王一段公案尚未結絶世須再出不應便爲隠藏計故首章及之瑄師儻以予言爲然則一笠支笻可以東矣嘉定戊寅二月甲子竹齋翁書贊附十八公贊并序世號松為十八公以其字言也予所居四旁皆松而森列于前者十有八本因緫名之曰十八公魯論曰歲寒然後知松柏之後彫也公之髙節見稱於洙泗億世而不朽秦時公嘗爲大夫喪失所守反不若桃源之花因避秦得名傳之至今是不知公者所謂大夫特強名耳公何心哉且以祖龍之威靈氣燄而倉卒之際非公無以蔽其身公素所蓄積求之當世雖榖城老翁爲留侯師視之猶褊彼區區以顏色媚人纔比於兒女子之態者為公役且不足而謂其得名過於公何其謬論歟公自春秋以來歴年悠久殆若華表之鶴而尚能傲睨霜雪無所回畏盖其天姿若是予幸與諸公周旋不知有古今先後之異懼公一旦捨予而去柱眀堂棟清廟則予將無以自託於公也遂為之贊曰矯矯乎雲霄之外挺挺乎霜雪之中語操則林下之傑語形則洞口之龍噫大材終大用烏不逢逢則必曰公等何出之晚斯民久望於帡幪惟如是其孰與同竹齋詩集卷三
