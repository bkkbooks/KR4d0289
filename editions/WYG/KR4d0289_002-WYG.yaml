body:
  text: 竹齋詩集巻二宋裘萬頃撰五言律詩雨後秋事雨巳畢秋容晴為妍新香浮䆉稏餘潤溢潺湲機杼蛩聲裏犁鉏鷺影邉吾生一何幸田里又豐年凉風凉風幾時動日暮巳秋聲稍稍月華白紛紛林影清予懐元不惡世事巧相攖所願西成後邊頭息戍兵用鄭浮梁韻簡圜師二首杖履山蹊窄鐘魚佛界深寒梅殘屋角春薺老牆隂一水元無恙扁舟尚可尋煩師掬清溜為我洗塵心古寺規模壮空山嵗月深春排千樹緑雲堕一溪隂地僻人稀到官閒我得尋歸來詫清賞未覺負初心次黄存之韻客宦何時了官居又嵗餘歸心五湖夢病眼一牀書近作君能富新功我略無不妨賦逰獵㑹有薦相如暘谷偶成愛日袪愁霧微和散積隂一牕塵外趣萬竹嵗寒心士要崇清節吾将老故林抱琴聊一醉何用覔知音書率更西林碑冉冉老将至區區心巳疲文章非世用字畫漫兒嬉廬阜多名刹隋人有斷碑驪黄雖易辯堂奥未容窺晚嵗送館人歸省不厭氷霜路衝寒辦一歸晨雞戒鞍馬春酒夀庭闈燈火知辛苦雲霄㑹奮飛相期紆緑綬非但戲斑衣别敬叔筆硯君無間氷霜嵗又除諸生得模範六藝共耕鉏松菊淵明宅蓬蒿仲蔚居相望儻相憶時寄數行書贈畫工綵筆三生夢春蓮萬葉花笑人為市道随分足生涯山路渾如水溪流淺見沙能來良不惡看我傲烟霞次胡伯仁韻山長飛鳥急江濶去帆微唱晚幾漁笛慿髙一釣磯從君濯氷雪滿袖得珠璣三歎不能巳歸來吟夕暉書晁文元道院集華屋金狨座雕鞍四馬車才堪誇世俗早巳落丘墟此病乆沈痼無人解埽除千年子晁子道院有遺書送范二丈入藍田書院二首今代崔斯立才髙不負丞君方為重客人謂得良朋敏捷朝千字辛勤夜一燈明年冠秋試萬里㸔飛騰君在淳熙日嘗師陸監丞今為後死者樂有逺來朋此道未墜地他時要續燈病夫力不足拱立看鶱騰夜坐再用韻二首洪井今真隠長沙昔漫丞餘生付巖壑拙宦愧交朋飯菜渾忘肉囊螢足代燈詩成夜将半雲際月騰騰家有輞川集人如王右丞琴書多暇日觴咏盡髙朋擬脱雲山屐來分夜案燈新詩要傳冩病眼在瞢騰送胡仲立入京昔對延英日諸公歎弗如敢言天下事不負案頭書此去朝雙闕懸知有異除榮途方著脚未用曵長裾次施真人韻素􅔖方多難丹砂儻一逢勿疑蕉覆鹿㑹見竹成龍澗水逺仍㓗巖花幽更濃行行望仙宇知在最高峰偶成松徑煩風掃柴門為雨扄行擕道院集坐對敬齋銘好事心常記閒談耳不聽觀空為時悞無異醉初醒老屋老屋久欹側随宜聊拄撐吾今且共住縁盡㑹須行雨打從教壊風揺不用驚世間虚幻相聚散本無情留淺沙故山豈不好蕭寺亦堪居作意多成礙無心始自如鐘魚飽香積枕簟熟華胥但惜詩成後旁無阿買書寄題喻髙士澹軒世事邯鄲枕生涯老子書能知澹中味雅稱竹閒居石徑排雲入霜根帶月鉏紛華不到眼贏得玩清虚晚歩日落欲閉戸風清聊杖藜千山猶帶雨一徑巳無泥㶁㶁水聲急悠悠雲影低催歸縁底事著意傍人啼榮姪試周汝生方滿嵗伯髪已星星桑苧甘投老蘭蓀喜向榮席間無一印帷下有諸經莫學魚兒戯來年快聚螢七言律詩題洪内翰爽榭霧閣雲牕天外安懸知幽趣勝人間簾櫳夜月浮銀海桃李春風醉玉山自笑紅塵無暇日浪慿清夢覔商顏何如飛佩随君後細㸔匡廬紫翠鬟次元徳弟示從龍入學生兒雖小莫憐渠學問工夫在謹初今日從師良不惡他年閉户反成踈雙親未老身無事諸父能大家有書好與汝兄俱努力後生叢裏試羣居一作少年叢裹鬬龍瀦次洪内相菊亭詩僊種菊未多時因菊名亭早有詩欲為寒花標晚節故将新句寄東籬平生未省翻三峽髙處那能賛一辭便得從容侍公側回頭已是十年遲次洪内相梅亭人間多是梅開後旋踵東籬事故常那得紅簾巻朱户細㸔素質傲清霜一生寄興雲山外幾度搔頭江路傍咫尺名園身未到夜忩羞對返魂香夜坐爐火篝燈孰與同此心吾欲付冥鴻茅簷巳作十旬雨蕙帳不禁連夜風一段清愁詩句裏十分寒事酒杯中溪雲未用安排雪且聽梅花試小紅雪天花一夜泄春機飛墜人間片片竒有色有光欺栁絮無聲無臭㸃梅枝縱横萬舞風回處表裏雙清月霽時此景惟詩可摹冩却憐老去不工詩寄髙菊磵謝恵詩集髙名如斗夜埀天無地追思毎自憐正欲為君尋五老乃䝉因我到雙泉新詩妙絶閒方就稚子擕歸喜欲顛此去湖邉不多逺秋風當覔釣魚船寄元齡弟夜牀風雨夢到處東湖西山如接連安信喜随烏鵲後雅懐知寄白鷗邉軒牕春動花隂滿圖史香浮墨色鮮箇裏詩書應有味不妨兼讀飬生篇次元徳弟寜逐春風上下狂懶從桃李借恩光只應朝市風波惡不似山林氣味長莫惜舉杯邀太白要看騎馬似知章南征他日如相憶詩句還須付革囊玉山道中時赴掌故之命麥苗堆綠菜花黄一簇人家古道旁酒熟不妨邀里巷年豐贏得事農桑世情只説宦逰好客裏那知歸興長我有平生蓑笠在釣絲何日理斜陽端午上饒道中一春留滯在京華午日依前未到家細葛香羅素無望黄塵烏帽亦堪嗟爭舟野渡人如簇立馬郵亭日欲斜遥想塤篪獻親夀綵衣羅拜酌流霞臨安别余求之長安車葢喜如雲邂逅惟君是故人風月滿懐情灑落珠璣撒紙句清新擕來客裏一尊酒洗盡湖邉十里塵富貴功名丈夫事别離無用淚沾巾鄉人羅朝宗與兵部尚書京公有舊将往見之遇予於樂平因餞别四時成嵗秋云暮九月肅霜天漸寒有客褰裳涉鄱水逢人劇口話長安懸知欲聽星辰履厭見從來苜蓿盤姑舉一觴餞行色無魚長鋏切休彈暘谷偶成竹近頗欣衣袂爽苔深長恐履痕侵夜燈四壁圖書影曉日一牀花木隂載酒只今誰好事絶絃從昔為知音區區外物成何用慎勿縁渠愁此心入京道中風雨因賦此遂退休新築書堂壁未乾馬蹄催我上長安兒時只道為官好老去方知行路難千里闗山千里夢一作念一畨風雨一畨寒何如静坐茅齋一作歸卧南牕下翠竹蒼梧仔細㸔閒居閒居最與性相便勤即繙書嬾即眠終日閉門真省事有時面壁似耽禪大椿嵗籥祈親夀斷簡生涯聼子傳待問洪崖覓丹訣白雲深處引寒泉松花開竹笋茂喜而詠之繁花宻笋暮春時妆㸃園林一段竒金粉生香風細細斑衣留潤露埀埀品髙宜入神仙藥節勁終全氷雪姿笑彼杏桃兒女態漫爭豔冶媚山歧睡起書懐時諸公相勉再出北忩終日廢書眠一枕清風直萬錢雲度茅簷輕冉冉泉生石砌凈涓涓不嫌雨脚花間注要聼秋聲屋外傳三徑初成吾欲老幕中何用泛紅蓮有感時與李宏齋有約去年今日西歸客曝背茅簷又一冬嵗月催人雖迅速簡編於我却從容知名焉用詩千首飬病聊須酒一鍾早晚杖藜修水去故人有約許相從用前韻謝伯量過訪山中勝逰千里笑談中雪片梅花正仲冬肯向席門尋孺子更能草具重茅容春風頓覺生寒谷夜榻惟愁聼曉鐘半世坡梅門下客乃今何幸得過從送胡仲衡穡齋憶昔樵江一見君喜君吃吃善談文别來嵗月今如許書裏工夫想得勤近世起家多白屋幾人馳志在青雲穡齋已踏賢闗路更有諸孫策異勲喜范光伯相過章江東下幾灣洄誰伴臞仙夜探梅離别不禁詩社冷遭逢莫放酒船回氷霜滿眼嵗将換花栁轉頭春又來安得飛騰九霄外鞭鸞笞鳳日相陪懐范光伯再用韻梅邉流水碧洄洄都把相思付折梅十載不禁雙淚落一樽期慰九腸回驚殘蝶夢鵲空喜望斷馬蹄人不來咫尺雲山尚如此天涯那觧得追陪次光伯韻竹逕當年手自開只今無處著莓苔絶憐此地過從少頼有髙人時復來籬下乆霜猶有菊水邉近臘正多梅我云眷眷三年别君莫匆匆一夕回錢塘次孫教南韻簿領歸來得泮宫一時衮衮任諸公市朝競逐利名走草木誰為臭味同霅水不妨披宿霧蓬山正要挹清風塵埃不得從君後豈但他時媿兩翁次朱震逺韻芳池緑水自生肥一作漪上有軒忩隐翠微花竹舊嘗開小逕門闌今又啟重扉直須閶闔排雲去要看長安躍馬歸詞賦合魁天下士春光端不負劉煇次王成之咏梅誰遣氷魂照夕陽揺揺一任北風凉眼前共有幾多蕊鼻觀一作孔胡為如此香佳實㑹須歸列鼎孤標已自壓羣芳濡毫我欲從君賦未害平生鐵石腸讀伯仁詩巻憶昔從君漁釣時小舟行徧楚江湄僧房夜月琴三叠客舍秋風酒一巵别後相思梅折盡書成欲寄雁來遲蛩聲驚覺寒牕夢自起挑燈讀舊詩不雨農時閱月天不雨嘉榖叢中龜兆生雲勢只随風聚散鳩聲空報客隂晴半生憂國髪欲白一飽無期心屡驚尚願秋陽化甘澍稍甦枯槁望西成乙亥六月鄉民祈雨夀春祠下嘉澍既降槁苗盡興萬口一辭頌神之徳予喜聊成俚語以書祠壁憂時曾上天庭疏憫物今為旱嵗霖一夕風霆百川水四郊香火萬民心山巔定有烟霞宅夜半常聞鐘磬音儻許塵蹤拜仙馭願營茅屋老雲岑郊行即事病來多日廢將迎試命巾車作此行稲實滿田秋事了松隂堆徑午凉生數山見我争傾葢一水邀人請濯纓却憶吾廬南浦外何時得與白鷗盟兀坐有感忘言編簡倦三復適意絲桐聊再行巳共白雲論久要更尋青鳥問長生按行泉石苔侵屨披拂松篁露濕纓此事洪崖知我舊歸與端合與同盟有感政爾雙泉謂王成之憶舊游栁江謂周架闍聞又有歸舟誰能不作千年調夢斷真成萬事休傾葢向來情莫逆奠芻無計淚空流重雲巳失鵾鵬影愁絶滄浪一白鷗送張髙安入京青衫十載蟾宫客黒綬三年鳳嶺頭循吏聲名武陽令故家風味冨平侯江邉休歎雙鳬去天上行㸔一網収八簉鵷班立仙仗莫忘回首顧沙鷗用黄子益韻二首青衫日日困塵沙安用浮名與世誇巳過半生真似夢未荒三徑且還家恨無沈水紆香穂喜有寒泉㵸茗花袖却西歸遮日手園林幽處看桑麻睡起忻然思慮少病餘猶覺應酬艱招揺風月聊須竹収拾雲烟幸有山但要世縁随手斷莫憂詩債幾時還追奔冨貴非吾事且占林泉一味閒寄劉擇之新居成西風吹雁過吾廬特地傳君一紙書九載不須論舊事萬金良喜得新居春回院落花侵座雨過池塘水遶除我欲退之門下去却愁無處覔金魚題懐秀堂莫教滿地長莓苔杖履從今日日來曲徑要随松巷轉柴門須對石橋開牆頭花木因時種案上圖書任意堆幸有林泉可投老忍将雙脚踏塵埃竹齋述事夢魂驚斷渺難續卧聼竹裏風泠泠寒蛩争鳴遶四壁缺月半堕横踈櫺平生細字髪欲白午夜短檠燈尚青稻粱作計吾不願願學滄海鴻飛冥大雪用前韻五首雨師風伯妙天機幻出乾坤一段竒曉對青山渾似畫夜㸔黄巻可忘饑金貂换酒非吾事鐡甲屯邉正此時失國殘兵應凍死書生猶賦采薇詩天孫雲裏散支機飛墜人間分外竒勾引芳尊留客醉栽培玉粒療民饑幅巾籬落尋梅處一舸江湖釣月時妙處惟詩可摹冩却憐老去不工詩誰扶天女下氷機剪水成花片片竒影落池塘波不動寒侵鷗鷺色皆饑縱横萬舞風回處表裏雙清月霽時浪戰未能無寸鐡對人羞誦醉翁詩伊人元不堕危機踏凍衝寒正自竒只怪飛花無處避都忘炊玉有時饑月明剡水回舟夜嵗暮梁園作賦時一段風流誰得似只今王謝却能詩誰知天巧出𤣥機但怪飛璚過眼竒暝立風枝寒雀倦愁吟氷谷曉猨饑蘆花洲渚月明夜栁絮池塘春暮時此景人間不長有冩真傳影正須詩題小桃源半月池邉倚痩藤望仙臺上岸烏巾塵埃一㸃不到地花木四時長是春載酒豈無好事者爛柯應有著棊人請君更種桃千樹凖擬漁郎來問津次伯仁善利閣看經堂中鐘磬鳴㸔經堂外水雲清山連逺渚鳥飛急風入輕帆舟去平烟樹不妨留夕照塵纓正欲濯寒泓慿誰為我問造物乞與少陵常眼明輓霞溪髙縣丞二首少年挾策上金鑾三拜郎官鬢未斑不説知音在霄漢但知投老向雲山柳絲隂裏陶潜樂花錦香中潘岳閒逝者不堪人事異洪崖亭下水潺潺公家原在洪崖宅自是洪崖向上人嗜酒一生真簡淡風標八秩更精神紛紛偶厭人間事去去歸尋洞裏春朱紱只今無覔處但餘佳句鎮長新竹齋詩集巻二
