body:
  text: 竹齋詩集附録宋寧宗賜祕書監丞裘萬頃敕敕祕書監丞裘萬頃帝王之治必有典籍之藏又擇當世聰明拔出之士聚於其間使得漸摩文學之益奬成其材以待國家之用故書省之設不計近功而要於廣蓄德所以厚其禮秩而難於用人庶以眀朕好古樂善之勤而勵學士大夫之行也爾萬頃博識多聞操行篤實諸儒所尚令聞惟舊延處兹位蔽自朕知夫尊其所聞而行之不倦使輔於世教而其效可言非獨優遊册府而已在爾自強以承朕志可依前件宋大理司直裘竹齋墓志銘朝請大夫寶謨閣待制提舉南京鴻慶宮楊簡撰古未有道之名堯曰疇咨若時登庸時是音之輕清者時謂順是道者我將登庸之時者以道無得而名故曰時舜曰人心惟危道心惟微始有道之名孔子語子思曰心之精神是謂聖又曰哀樂相生正明目而視之不可得而見傾耳而聼之不可得而聞孟子曰氣配義道列而為三簡之行年二十有八首秋居太學循理齋之東序以我先大夫嘗有訓俾時復反觀簡方反觀忽見天地內外空同一體範圍天地發育萬物果然焯然心之精神無形體無際畔無異同孟子推測而未覺屢有囂囂之言此何等態度而出諸口言仁人心也而曰不下帶直可笑曰説大人則藐之直可鄙簡舊同寅裘元量日者因問答從容元量忽覺覺非心思言語所及即伊川之覺孔子謂智及之顏淵庶幾餘子日月至焉而已元量後為大理司直府君諱繼祖字慶源號無諍居士有不逞登門慢罵居士飲之酒罵者慚而退自是過其門者咸曰長者家也府君中年謝家事攝衣危坐終日泊然二三世無一字入公門有以語見侵略不動曰吾祖固如是吾家法則然乾道七年飢質田得粟療飢者不輟里中癃老今猶感泣以為卯辰之嵗微此翁與某而人皆為溝中瘠矣元量諱萬頃嘉定癸酉六年除吏部架閣明年遷大理司直力丐外任月三上章有旨添差江西撫幹以便祿飬卒於官銘曰慶源厚德元量默識慈湖楊簡哀敬老筆乞裘萬頃幸元龍遺澤表臣聞居賢德以善俗者君子之澤也善善而及子孫者春秋之義也蓋儀型一方必有善士上之人固當超越故常不間存沒庶足以昭勸懲而敦禮教臣備員江南西路延見父老詢問人物皆言江右夙號多士率為顯人獨豫章裘萬頃髙安幸元龍皆鄉之師友不幸以厄窮終其身莫有為之言者恭惟皇帝陛下勵精改紀正氣日伸當世老成博雅之彥收召無遺而此二人者存不及見天日之清明歿不獲沾雨露之膏澤為善而不報識者懼之臣既忝外臺耳目敢不以聞伏見贈通直郎裘萬頃清名厚德矜式士林博學髙文源流賢派方嘉定時大臣德政萬頃雖蒙收召遇除官則辭之既辭掌故又辭司直乃乞添差帥屬而去不知者謂為親老也乃其自度枘鑿又不欲近名耳秩滿不調退歸西山衡茅之下既老且病猶日孜孜以治心飬氣為躬行綱要以忠信孝悌教其鄉黨子弟諸司曹彥約等繼為乞差遣於朝僅還幕府一月而歿蓋近世以老選調如萬頃者極少而萬頃不悔也故朝章郎幸元龍英辭偉論萬字立成直氣雄才一毫不屈分教隨州先臣喜其剛正奏舉改秩自是宰邑倅州聲滿江漢輕財急義以儒知兵屢奏書天闕指陳時政忠義激發皆所難言當路惡其論髙志廣亟聞於朝遂令致仕時年方五十有八襆被而歸日與其徒窮經講學點墨不入帝城大臣諷令陳乞屹不為動蓋元龍去才九閲月而路門親政賢路彚征矣照得萬頃嘗綴朝列有子四上禮部尚為布衣元龍既為員外郎有子亦與漕薦然以義方所漸不肯自行陳理一則無澤而厄於天一則澤可及而困於人此江右有識之士尚友論世而每為之慨歎也豈所以扶頺風而起人心哉臣愚欲望聖慈深考春秋之義追懷君子之澤除萬頃己蒙贈官外特與其子從龍補受文資將元龍改正致仕放行合得恩澤俾其子應鑑承受仍與元龍追理生前磨勘酬賞慶典恩例優加贈恤庶使賢者之後不絶于祿仕公議之屈獲伸于明時其於治化實非小補須至奏聞者右謹録奏聞伏候敕旨端平二年七月日朝散大夫祕閣修撰江南西路計度轉運副使兼權知隆興府新除太常少卿臣吳潛狀奏林庭㭿嘉靖江西通志人物志裘萬頃字元量新建人淳熙十四年進士有孝行節操其學惟以存心為主嘉定初除吏部架閣遷大理司直力丐外任添差江西撫幹以便祿飬卒於帥屬贈通直郎慈湖楊簡志其墓刻云盧廷選萬厯南昌府志儒林傳裘萬頃字元量新建縣人淳熙進士有孝行節操其學專以存心為主粹然一出乎正遷樂平簿清譽播聞轉大理司直力求補外以便祿飬添差江西撫幹時真德秀為安撫深器重焉著竹齋詩集卒贈通直郎慈湖楊簡志其墓以默識稱之端平間知隆興府吳潛疏言萬頃清名厚德矜式士林博學髙文源流前輩其生平出處與故李燔相似乃録其子鄉貢士從龍為泰和尉從龍仕至兵部侍郎答竹齋劄某切以新陽既復物有生意伏惟撫幹司直契丈羽儀幕府天相德人台候萬福某甲戌都門之别轉首六寒燠矣欽仰道義未之或忘敢圖比來叨恩分閫而執事者實居溫石之任殆天意也前過莆中見一二士友始知司直已再入幕不勝喜慰既抵鄉關迓吏出示函翰益用感懌某駑鈍之資初無可用公朝過聼躐付十連拜命以來日夕危懼未知所濟所賴賢者為僚且於鄭鄉利病請求素熟繼自今切望推誠傾助俾免於戾實千萬大幸短啓不工他俟續續遣狀伏乞台照右謹具呈嘉定十二年己卯十一月十又八日朝散大夫新除集英殿修撰權知隆興府江西安撫真德秀劄子答竹齋啓某啓伏以分顧憂於閫外自視闕然贊籌畫於幕中賴有賢者頗曽見否何喜如之伏惟撫幹司直學問配于古人孝友聞於天下陽亢宗之居晉鄙聞者皆善良之歸崔祐甫之佐江西偉然多謀議之益往者朝行之獲綴今焉王事之偶同豈非天憫其疏慵故俾日親於鴻碩議論至於十反竊有望焉功德被于八州庶幾昔者謹奉啓候起居兼謝伏惟台察真德秀再拜跋竹齋漫存遺藁西山外夷而中秀故多逸士與貴人蓋貴則有大顯榮于時而不與生俱盡則竹齋翁其人也堅苦好修發之聲畫其清徹骨歿後數年孤從龍料檢手澤得詩文數百篇示豫豫把玩起悲起敬遂書卷首而歸之時嘉定癸未夏五月之吉修江桐原胡泳伯量敬書跋竹齋指南竹齋翁清德照映一世發於聲畫超逸遒徑亦可寶玩豫少翁八歲行輩與之交者半世今亡矣欲搜檢故書會聚所藏書翰表而出之未暇也一日新陂瑄上人出翁遺墨一軸示豫詩四帖七且題其端曰竹齋指南把玩久之如見其人因思吾徒碌碌不如林下人愛慕之専也願志其卷末為之內愧云寶慶丙戍仲夏朔吉修江小㙰病叟胡泳書跋竹齋手帖裘元量孝友著於家節概聞於時遺珠賸馥散落人間者未能盡見即此二帖可以觀其表裏如一矣無所怨於天而年不稱其德無所求於人而仕不優于學乃其所也寶慶丙戌季夏昌谷曹彥約書於吳山寓舍跋竹齋墓碑嘉定丙子孟冬十有二日惟孝省拜慈湖先生於浚眀嘗從容問四方從遊之士有悟道者得二十六人裘君元量司直其一也惟孝識而藏之罔敢失墜而于司直無一面之雅後六年聞司直亡矣未嘗不往來豫懷也又四年為寶慶二年仲春天子命試進士於南宫惟孝備員考校得三䇿甚偉觀者莫不擊節拆號視之裘其姓由庚其名蓋自是士大夫間往往言司直之有子也一日訪豫示司直墓碑即乃慈湖老筆讀之肅然起敬又得披挹言議風度於一序一詩之間信乎學有淵源而由庚之振其家聲也九原不作由庚其勉之秋孟四明林惟孝敬書於寅清堂跋竹齋遺藁可憐堂堂十八公老死不入明光宫東坡和張文潛髙麗松扇詩也竹齋翁堅剛之操不究於用蓋甚似之急雪鶺鴒相並影驚風鴻雁不成行山谷和元明贈别詩也竹齋翁友悌之愛情見乎詞亦默契之至於文章典雅字畫妍秀足以自成一家而九原不作矣斂袵太息附名於後寶慶丙戌季冬朔霅川倪祖義謹書題竹齋指南詩李燔元量清標酷似僧詩情書意兩相承於今自有髙人處不尚空窗尚巽升送裘司直得請西歸詩真德秀輕舸龍山頭木蘭作雙櫓飄然一作飄飄裘司直乘向南昌去問君鵷鸞中脫身遽如許棲遲三十年始得官掌故小須上上考豈不登省户自言野心性眯目九衢霧修竹歲云晚萱草秋亦暮嗷嗷投林烏猶得反其哺江西父母邦非復舊饒裕蠻煙一腥穢樂歲且狼顧遺黎空杼軸行旅窘刀布天門窅萬里可望不可籲君今佐元戎安危一作精采繫一路瘡痍俟滌濯畫諾歸佽助先聲姦人惴一作路人喜髙節懦夫慕遄當在前席一正天子度白鷗沒浩蕩蒼鶻任指呼我亦南陔人扁舟從此具挽竹齋詩憶昔摳衣造竹齋竹聲琴韻兩相諧重來琴鎖紅塵滿寒雨蕭蕭滴蘚苔無奈斯文墜不興煢煢吾黨又凋零白雲寒鎖洪崖頂一度翹瞻一愴情挽竹齋詩劉克莊築室西山下孤標未易親長間如野鶴偶出似祥麟屬者陪髦士嗟乎瘞玉人北風吹老淚空灑暮江濵贈雲卿詩并序趙蕃裘司直之子元龍訪豫於章泉山中示以司直手澤一册呼燈閲之迫寐而止待旦始卒編司直詩既工字亦圓熟可玩元龍即欲攜之以東兹來又匆匆無自可借留子州有詞人可以呈似儻能摹刻十數紙與放翁臨川所刋陵陽詩稿並行正自佳耳屬病目不暇為寫洪公書納謁之際道我此意乃翁里居時曽上廬山牘曹公待制懷賢訪其孤今值詞人牧我嘗愛臨川韓草刋於陸爾侯古雅趣與陸並堪躅而翁詞翰佳世亦思在目爾其持此詩勿憚拜僕僕侯寧謂我易未遂嗔爾瀆峩峩兮西山光焰那久伏題竹齋遺像魏了翁箕裘克紹瀟灑出塵身能致主澤足及民厥裔象賢令範嘗新
