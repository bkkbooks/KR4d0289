body:
  text: 竹齊詩集跋宋大理司直先竹齊詩集三卷明嘉靖間工部郎中先魯江公鋟版行世兵燹後版散失先府君將重授諸梓其心未嘗一日忘也府君知四川之榮經縣奏侍榮經署承府君命迄今十有六年又未敢一日忘也奏今待罪錦縣縣為興京地土厚民淳無訟獄簿書之擾歷三考得積俸以剞劂是集集成奉而歎息奏父子兩世各六十餘年而此志始克成可不謂難乎不寧惟是魯江公之初刻也自宋淳熙至嘉靖中間三百有六十年今之重刻也自魯江公以來又二百四十年歷歲月何其多也而是集經世代興亡兵火變遷猶能卷帙依然壽之梨棗以傳于世後之人可不知所重乎先君之屬子姓也豈徒刻是集而諄諄己也後之人不好學則是集置于庋閣飽于蟫魚雖重刻與未刻等非先君所期望之意也願後之人善承之歷億萬年毋墜厥緒可也十六世孫奏謹跋
