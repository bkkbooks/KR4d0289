body:
  text: 竹齋詩集卷一宋裘萬頃撰五言古詩行役宿霧鎖山椒落月挂林側﨑嶇歷岡巒髣佛辨阡陌秋高風露寒道逺時序迫安得歸故園篝燈理書册武陽渡一舟小如葉橫在波濤中紛紛川上人欲渡愁北風有帆天際來漸近葭葦叢寄聲與問訊恐是陶朱公宿佛頭塔孤村三四家籬下盡禾黍主人慣入市能作市中語開窗對竹山揖客治尊俎白雲忽在眼客淚墮如雨羅溪橋我來從西昌日日困塵土誰知羅溪橋淨若初過雨長松列左右清風奏宫羽薄暮舍籃輿扁舟渡溪去别友清宵月滿梁相思幾搔首不圖塵土中得共一尊酒人事好乖甚隨復而分手惟有管鮑心明明若箕斗次許秀才韻二首癡兒欲了事事竟莫之了崇朝㺯朱墨校勘是與否徐觀雁鶩行大半落渠手敗羣雖巳去考牧未有道拙工不量力自謂中了了高談蓋一座衆可巳獨否斯須臨斧斤汗背血兩手旁觀信善斫莫肯告以道病中聞伯量相訪寄之二首我屋修竹根身間境逾靜維摩本無心誰令示人病夕陽耿踈林影落莓苔徑佇立有所懷髙人儻乘興髙人在城郭應酬頗紛如憶我煙霞栖遺我一紙書雨餘窗户涼蛩聲滿階除相過有成言何時命巾車次范光伯泛江韻夫君陶玩徒俗子所不快屹然頽其中特立蓋甚介平生江湖樂欲去不得邁何當從君逰漁釣寄吾解蟻運知戰不能損檀氏所以亡吾愧與敵槐將何固封疆及此間暇時相與積乃倉不須更他騖富國兵自強次伯仁善利閣小室韻山林吾所廬夜月但對影焉知江上人一日了萬境褰裳步崇臺有室妍且靜徘徊不能去坐見四山暝見雪玄冥當語誰餉我一簷雪吾廬本來靜得此更清絶遙憐北海上往往已盈尺齧氊人在否毋凌漢臣節出門出門復入門吾行竟安之擕書北窗下翻閲聊自怡有懷千載人掩卷還歔欷采采首陽薇戀戀商山芝一裘或終身欣然釣江湄斯人不可作斯道日湮微目前稻粱謀鳬雁方齊飛青田寂無音嵗晚將疇依慎勿出門去塵埃染人衣菖蒲康廬入吾懷十載馳夢魂踵門者何人遺豫以芳蓀歡然得其趣如對五老言幽姿出巖谷常帶氷雪痕塵容為一洗兩目不復昏忽思三峽流褰衣涉潺湲因仍一寸石浸潤九節根人言可扶老嵗月須其蕃兹理諒不誣吾將從綺園宿田家竹亭我家西山巔四壁皆此君朅來事奔馳日與茅葦親方思坡仙詩恐入俗士羣止我宿者誰此君滿其門頎然千百夫一見若故人夜深清風來好音夢中聞呼童啓北窗為渠炷爐芬送詩僧如師西逰鄉來詩壇上權可聲籍籍君雖後兩翁而巳分半席主人龍門髙宜有如此客橫行翰墨場往往一當百挾是今西逰吐談取雙璧要須早歸來成就法王宅從人覔墨梅熏爐束詩魂茗碗驅睡思掩關寂無營翰墨自娛戲山寒溪正清月淡雪初霽橫斜兩三枝見説可人意天機如胸中出手特餘事何時翦氷紈來對病居士睡起疾去得安卧寒宵不知長鄰雞忽聞聲曙色侵我牀人生孰無營晨興固其常奈何以一身投之百憂場吾方休吾心與世長相忘適逢希夷翁授我枕中方意行到華胥日吳猶徜徉回觀一世人擾擾良可傷誰能從我逰要須留春皇讀邸報時楊慈湖諸公得郡紛紛天下事翻覆良難期不知窈冥中主張者云誰工拙判兩途人謀豈容施得非欲平治機緘遂潛移目前三四公並用無一遺毋嫌滯一州民實邦之基鄉來畨江頭親見國子師謂慈湖德行淵與騫千載如同時斯人使臨民兒不賴母慈人言致泰和須索登臯夔位崇澤斯均否則失所宜天乎儻人從何時可臻兹次伯量贈别詩韻我生既駑下且復寡見聞時時警其愚姻黨賴有君自慚將且疲不足張此軍君乃不我棄歡然與同羣願學如之何此志亦巳勤正坐未知方所得不足云人生所好雜其力用是分詞章末技耳安能嫓皇墳而况字書學兀兀纂説文曷若鞭吾心或有汗馬勳請益恨未能别君大江濆長吟昌黎詩安得身登雲老農歎霜耕氷在趾雨種泥沒膝旱魃忽為虐耕種漫勞力去年幸一稔今嵗免艱食細聼老農語令我三歎息但願從此去龍骨長挂壁大田多黍稌髙廪若山積或云榖大豐則恐錢轉嗇夏租星火急處此未有策細民一錢稅往往亦追索榖賤反傷農此語傳自昔語客且勿憂新絲尚堪質送范光伯北行玄冥將歸休勾芒已促裝江邉踈柳青江上寒梅香有客當此時中流駕風檣欲學太史公窮汶泗沅湘吾聞帝王州雄麗幾錢塘疇昔駐六龍至今繪未央鷺洲橫渺瀰鳳臺摩青蒼名山與大川往往遙相望是間或小留不妨月徜徉平生學屠龍袖手五字章兹逢賢主人定知奏宫商追李逐杜陵相與升其堂要令千萬篇金薤埀琳琅秋風鴻雁來因之東南翔寫君磊磈胸慰我離别腸安樂窩示元德弟二首往時病僧寮今為安樂窩昔病而今安所得良巳多百年直須臾一丘且婆娑倦翼棲茂林潛鱗渺重波方欣隨所願豈復知其他朝來啓南窗羣山鬱嵯峨上有無心雲乘風逺相過却觀聲利場紛紛正橫戈到頭蠻與觸勝負能幾何曷若休吾心考槃依澗阿孟夏草木繁雨餘氣清和四壁環斷碑經史星宿羅幅巾據胡牀翛然自吟哦因之成此詩要使兒童歌清泉出石竇白雲卧山窩淋淫乍開霽原野歡聲多吾廬近西峯其下林婆娑解衣坐磐石持竿釣清波主人忘機心鷗鳥亦無他東魯與南郭泰山等峩峩周子何人哉自許不啻過一朝離草堂山英遂橫戈折轅不得還如此俗駕何仰視前修翁鉛刀比太阿子弟山林人心平氣自和歡然樂簞瓢笑彼葷羶羅好書不厭觀佳句時一哦煩賡紫芝曲為我醉時歌題余仲祥松齋芳妍桃李場紛趨歘成蹊長松坐偃蹇遂爾不見知平生異時人不與俗轉移蕭然塵埃中擅此丘壑竒窗空境逾清四壁風來吹抱琴揖蒼髯喜氣掀兩眉臭味既與同相親不相違直期閲嵗寒可但忘朝飢斯正如乃翁過處更過之直比千丈幹厯落不受羈只恐大厦成梁棟各有施出處初何心山靈勿疑渠題伯量春風堂未登春風堂嘗讀春風詩春風不易得令人每懷思一堂誰獨無所至皆有之奈何堂中人此意多背馳聼雨不對牀煮豆先燃萁寧賡粟布歌不肯吹塤篪和氣自此傷怨怒無休時遂令君家堂獨立修江湄昔我嘗宦遊兄弟輕别離自從失豫季憂悶鬢成絲仲叔幸無他相從日怡怡數榻松竹間頗與我輩宜濁醪無獨斟陳編有同披從今當杜門共試春風詞燕谷恐尚寒暖律冀一吹君能不靳否春風元不私錢塘别吳長文司理同心而異鄉既見復輕别豈終無會期南北渺難必郵亭君與我強飯再三説此意非不領欲話聲巳咽肩輿使前驅分手大江側升髙輒回首猶擬望顏色豫家古南州勝友固不乏如君相知深千百未見一君才十倍我君德更剛直贈行詩滿紙字字良有益誰與趣我去胡不緩旬浹噬臍悵弗及寫心寄愁絶咨咨草根蟲咨咨草根蟲瑟瑟葉上雨休休退食人落落誰與語陳編竟日披陋室隨時處此心苟自樂貧賤亦得所夷齊雖餓死清風冠千古顏子瓢屢空宣父極稱許但當守吾仁晉楚何足數試看松與柏矯矯傲寒暑七言古詩夜坐薦福寺次王成之韻鞭鸞未暇相追逐且向祗園止君宿清談待得月華生窗户明明耿殘燭誰令泉石墮吾前洗淨人間絲與竹風帆明發君不留此樂只應吾所獨厭音葉原山中曉行碧雞夜半聲啁哳喚起幽人步林樾秋髙風露著羣木無數寒花泣明月松篁一徑宛如畫石溜涓涓更清絶山巔便好結茅廬莫待他年鬢成雪秋試示諸兒漠漠輕雲弄寒影霏霏小雨生秋興黃槐開盡舉子心丹桂喜傳仙籍信竹齋雙手縮袖間坐看羣兒鏖一戰春風躍馬不為難此去毋言日邉逺十二月大雨一冬都無五日寒赤日杲杲后土乾水官丐歸帝弗許飯顆山頭誰著汝何如一尊隨意傾酒酣不問濁與清明朝縱有三尺雪灞陵詩句無庸説贈拂雲主人十年作計須種木一日不可使無竹道人於此得三昧緑霧中間著蒼玉拂雲誰為名其居我亦心同雲卷舒相期直覓飛霞佩不用重拈種樹書次余主簿仲庸梅韻春醪欲氷木欲折急雨風吹不成雪玉妃夜墮廣寒宫開作寒花賽清絶未須千樹插山巔且要幾枝橫水邉暗香踈影尚無恙憑誰喚起西湖仙不妨琢句一作白更馳送一洗十年塵土夢鐵心元不為渠回眼底珠璣聊簸弄再呈仲庸芳枝莫遣風吹折要看枝頭千點雪孤山疇昔盛開時十里香颸飛不絶蹇驢烏帽照霜顛長吟竟曰溪橋邊自從和靖收聲後一時翰墨歸坡仙只今往事飛鴻送寂寞西湖投老夢花開花落漫傷心明月清湍誰與弄贈仙茅道士茅齋髙卧日將午自起鈎簾試香縷門前剝喙誰叩門杖履蕭然顏貌古亟呼兒童延入座餉以清風滌袢暑論醫説相俱第一觸熱逺來尋我語嗟哉人生浪辛苦到頭事事皆塵土萬錢鼎食吾無取君有仙茅幸分與寄題胡穡齋盆池穡齋主人嗜泉石一舸來家楚江側水光山色晴逼人中有軒忩更清絶汲泉為池良不惡坐見漣漪照金碧奩開寶鑑大如許月墮氷輪光欲溢何須泰華尋玉井漫説仇池有仙穴箇中風露無處著長為昭華洗炎熱嗟豫踈懶真成癖想像哦詩竟何益安得身為穡齋客醉卧池邊聽錦瑟竹齋詩集卷一
